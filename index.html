<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Site</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: #000;
  color: #fff;
}

/* SCENE */
.scene {
  perspective: 1200px;
  width: 100vw;
  height: 100vh;
}

/* ROTATING OBJECT */
.cylinder {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s ease;
}

/* PANELS */
.panel {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
}

/* POSITIONING (IMPORTANT) */
.panel:nth-child(1) { transform: rotateY(0deg) translateZ(300px); background: #111; }
.panel:nth-child(2) { transform: rotateY(90deg) translateZ(300px); background: #222; }
.panel:nth-child(3) { transform: rotateY(180deg) translateZ(300px); background: #333; }
.panel:nth-child(4) { transform: rotateY(270deg) translateZ(300px); background: #444; }

/* BUTTON */
button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="scene">
  <div class="cylinder" id="cylinder">

    <div class="panel">HOME</div>
    <div class="panel">ABOUT</div>
    <div class="panel">WORK</div>
    <div class="panel">CONTACT</div>

  </div>
</div>

<script>
// CORE LOGIC (WORKING)

let current = 0;
const total = 4;
const cylinder = document.getElementById("cylinder");

// rotate function
function rotate() {
  const angle = current * -90;
  cylinder.style.transform = "rotateY(" + angle + "deg)";
}

// swipe support
let startX = 0;

window.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

window.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX < startX - 50) {
    current = (current + 1) % total;
    rotate();
  }

  if (endX > startX + 50) {
    current = (current - 1 + total) % total;
    rotate();
  }
});

// desktop keys
window.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") {
    current = (current + 1) % total;
    rotate();
  }
  if (e.key === "ArrowLeft") {
    current = (current - 1 + total) % total;
    rotate();
  }
});
</script>

</body>
</html>
