<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourAgency | Aero</title>

<style>
/* --------------------------
   GLOBAL STYLE (FRUTIGER AERO)
-------------------------- */
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
}

/* floating glow background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent),
              radial-gradient(circle at 70% 70%, rgba(0,255,255,0.2), transparent);
  animation: moveBg 10s infinite linear;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

/* --------------------------
   3D SCENE
-------------------------- */
.scene {
  perspective: 800px;
  width: 100vw;
  height: 100vh;
}

.cylinder {
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.9s cubic-bezier(0.77,0,0.175,1);
}

/* --------------------------
   PANELS
-------------------------- */
.panel {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;

  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);

  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);

  box-shadow:
    0 0 40px rgba(255,255,255,0.3),
    inset 0 0 20px rgba(255,255,255,0.2);

  transition: all 0.8s ease;
}

/* 4 panels (cube style) */
.panel:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
.panel:nth-child(2) { transform: rotateY(90deg) translateZ(250px); }
.panel:nth-child(3) { transform: rotateY(180deg) translateZ(250px); }
.panel:nth-child(4) { transform: rotateY(270deg) translateZ(250px); }

/* mobile scaling */
@media (max-width: 768px) {
  .panel:nth-child(1) { transform: rotateY(0deg) translateZ(150px); }
  .panel:nth-child(2) { transform: rotateY(90deg) translateZ(150px); }
  .panel:nth-child(3) { transform: rotateY(180deg) translateZ(150px); }
  .panel:nth-child(4) { transform: rotateY(270deg) translateZ(150px); }
}

/* --------------------------
   CONTENT
-------------------------- */
.content {
  text-align: center;
  max-width: 600px;
}

h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #fff, #00ffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

h2 {
  font-size: 2rem;
}

p {
  opacity: 0.9;
}

.btn {
  margin-top: 20px;
  padding: 12px 30px;
  border-radius: 30px;
  background: linear-gradient(90deg, #00f0ff, #00ff88);
  color: #000;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 0 20px rgba(0,255,255,0.8);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0,255,255,1);
}

/* floating animation */
.content {
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

</style>
</head>

<body>

<div class="scene">
  <div class="cylinder" id="cylinder">

    <!-- HERO -->
    <div class="panel">
      <div class="content">
        <h1>Future Websites</h1>
        <p>Swipe to explore a new digital dimension</p>
        <a class="btn" onclick="next()">Start</a>
      </div>
    </div>

    <!-- ABOUT -->
    <div class="panel">
      <div class="content">
        <h2>About</h2>
        <p>We build vibrant, animated, AI-powered websites with next-level UX.</p>
      </div>
    </div>

    <!-- SERVICES -->
    <div class="panel">
      <div class="content">
        <h2>Services</h2>
        <p>Web Dev • SEO • Automation • Email Systems</p>
      </div>
    </div>

    <!-- CONTACT -->
    <div class="panel">
      <div class="content">
        <h2>Contact</h2>
        <p>Email: youragency@example.com</p>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
